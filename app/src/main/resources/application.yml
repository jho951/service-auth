spring:
  application:
    name: auth-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
      - com.ipguard.config.IpGuardAutoConfiguration

  config:
    import:
      - optional:classpath:${spring.profiles.active}/application-${spring.profiles.active}_auth.yml
      - optional:classpath:${spring.profiles.active}/application-${spring.profiles.active}_sso.yml
      - optional:classpath:${spring.profiles.active}/application-${spring.profiles.active}_data.yml
      - optional:classpath:${spring.profiles.active}/application-${spring.profiles.active}_db.yml
      - optional:classpath:${spring.profiles.active}/application-${spring.profiles.active}_docs.yml
      - optional:classpath:${spring.profiles.active}/application-${spring.profiles.active}_server.yml
  profiles:
    group:
      dev: [ "dev_auth", "dev_sso", "dev_data", "dev_db", "dev_docs", "dev_server"]
      prod: [ "prod_auth", "prod_sso", "prod_data", "prod_db", "prod_docs", "prod_server"]
    active: ${SPRING_PROFILES_ACTIVE}

internal:
  api:
    key: ${INTERNAL_API_KEY:local-internal-api-key}

user-service:
  base-url: ${USER_SERVICE_BASE_URL:}
  internal-api-key: ${USER_SERVICE_INTERNAL_API_KEY:${INTERNAL_API_KEY:local-internal-api-key}}
  jwt:
    issuer: ${USER_SERVICE_JWT_ISSUER:auth-service}
    audience: ${USER_SERVICE_JWT_AUDIENCE:user-service}
    subject: ${USER_SERVICE_JWT_SUBJECT:auth-service}
    scope: ${USER_SERVICE_JWT_SCOPE:internal}
    ttl-seconds: ${USER_SERVICE_JWT_TTL_SECONDS:60}
    secret: ${USER_SERVICE_JWT_SECRET:${AUTH_JWT_SECRET:${JWT_ACCESS_TOKEN_SECRET:}}}
