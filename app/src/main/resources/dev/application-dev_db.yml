spring:
  datasource:
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    url: ${MYSQL_URL:jdbc:h2:mem:authdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${MYSQL_USER:sa}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 3
      connection-timeout: 20000
      initialization-fail-timeout: 60000

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
