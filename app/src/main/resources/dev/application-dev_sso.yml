sso:
  state-ttl-seconds: ${SSO_STATE_TTL_SECONDS:300}
  ticket-ttl-seconds: ${SSO_TICKET_TTL_SECONDS:120}
  github:
    client-id: ${SSO_GITHUB_CLIENT_ID:}
    client-secret: ${SSO_GITHUB_CLIENT_SECRET:}
    callback-uri: ${SSO_GITHUB_CALLBACK_URI:http://localhost:8080/login/oauth2/code/github}
  frontend:
    explain:
      origin: ${SSO_EXPLAIN_ORIGIN:http://localhost:3000}
      redirect-uri: ${SSO_EXPLAIN_CALLBACK_URI:http://localhost:3000/auth/callback}
    editor:
      origin: ${SSO_EDITOR_ORIGIN:http://localhost:5173}
      redirect-uri: ${SSO_EDITOR_CALLBACK_URI:http://localhost:5173/auth/callback}
    admin:
      origin: ${SSO_ADMIN_ORIGIN:http://localhost:5173}
      redirect-uri: ${SSO_ADMIN_CALLBACK_URI:http://localhost:5173/admin/auth/callback}
      ip-guard:
        enabled: false
        default-allow: ${SSO_ADMIN_IP_GUARD_DEFAULT_ALLOW:false}
        rules: ${SSO_ADMIN_IP_RULES:127.0.0.1,::1,192.168.65.1,172.17.0.1,172.16.0.0/12}
  session:
    cookie-name: ${SSO_SESSION_COOKIE_NAME:sso_session}
    cookie-secure: ${SSO_SESSION_COOKIE_SECURE:false}
    cookie-http-only: true
    cookie-same-site: ${SSO_SESSION_COOKIE_SAME_SITE:Lax}
    cookie-path: /
    ttl-seconds: ${SSO_SESSION_TTL_SECONDS:604800}
