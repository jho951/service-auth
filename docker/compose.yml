name: auth-service

services:
  auth-service:
    image: ${AUTH_SERVICE_IMAGE:-auth-service:dev}
    depends_on:
      auth-mysql:
        condition: service_healthy
    networks:
      - service-shared
      - auth-private

  auth-mysql:
    image: mysql:8.0
    volumes:
      - auth-mysql-volume:/var/lib/mysql
      - type: bind
        source: ../db/schema.sql
        target: /schema/auth-schema.sql
        read_only: true
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h "$$MYSQL_HOST" -u "$$MYSQL_USER" -p"$$MYSQL_PASSWORD"
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auth-private

volumes:
  auth-mysql-volume:

networks:
  service-shared:
    external: true
    name: ${SERVICE_SHARED_NETWORK:-service-backbone-shared}
  auth-private:
    driver: bridge
    internal: true
